site_name: "The Hellbreakers Chronicle"
site_description: "A player-facing wiki and running log for the Hellbreakers campaign."

# NOTE: site_url is intentionally NOT set. Material only emits a sitemap.xml when
# site_url is configured, and this site is "public but obscured" (noindex, no sitemap).

theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.instant
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - awesome-pages
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

# NOTE: No `nav:` block. Navigation is handled entirely by the awesome-pages plugin
# via `.pages` files, so the tree adapts to whatever the build script generates.
