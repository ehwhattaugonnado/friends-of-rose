site_name: "The Hellbreakers Chronicle"
site_description: "A player-facing wiki and running log for the Hellbreakers campaign."

# NOTE: site_url is intentionally NOT set. Material only emits a sitemap.xml when
# site_url is configured, and this site is "public but obscured" (noindex, no sitemap).

extra_css:
  - assets/stylesheets/hellbreakers.css

theme:
  name: material
  custom_dir: overrides
  font: false   # fonts loaded in overrides/main.html (Cinzel / EB Garamond / Oswald)
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.instant
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom   # palette defined in hellbreakers.css
      accent: custom
      toggle:
        icon: material/candle
        name: Into the night
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Light the candles

plugins:
  - search
  - awesome-pages
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

# NOTE: No `nav:` block. Navigation is handled entirely by the awesome-pages plugin
# via `.pages` files, so the tree adapts to whatever the build script generates.
